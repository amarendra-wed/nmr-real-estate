  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NMR Real Estate</title>
  <link rel="icon" type="image/jpeg" href="nmr-logo.jpeg">

  <style>
    *{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f7f4ed;color:#18231f}
    header{min-height:400px;padding:40px 7%;color:white;background:linear-gradient(90deg,#123b31dd,#123b3155),url("https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1800&q=85") center/cover;display:flex;flex-direction:column;justify-content:center}
    .brand{display:flex;align-items:center;gap:10px;font-weight:bold;font-size:1.2rem}
    .logo{width:55px;height:55px;border-radius:50%;object-fit:cover;border:2px solid #d5a449}
    main{width:min(600px,92%);margin:50px auto}
    .form-container{background:#fff;border:1px solid #d6dfd9;border-radius:9px;padding:30px;box-shadow:0 4px 10px rgba(0,0,0,0.02)}
    h2{margin-top:0;color:#155a49;text-align:center}
    input,select{width:100%;min-height:45px;margin:12px 0;padding:10px;border:1px solid #d6dfd9;border-radius:7px;font:inherit}
    .button{width:100%;min-height:48px;margin-top:15px;border:0;border-radius:7px;background:#d5a449;color:#18231f;font-weight:bold;font-size:1.05rem;cursor:pointer}
  </style>

<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TSLHV57H" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <header>
    <div class="brand"><img class="logo" src="nmr-logo.jpeg" alt="NMR Logo">NMR REAL ESTATE</div>
    <h1 style="margin:20px 0 10px;">Book Your Site Visit</h1>
    <p style="margin:0;color:#f0f5f2;">Fill out the form below to register your requirements.</p>
  </header>

  <main>
    <section class="form-container">
      <h2>Site Visit Details</h2>
      <form id="appointment">
        <input type="text" required name="name" placeholder="Your name">
        <input type="tel" required name="phone" placeholder="Phone number">
        <input type="text" required name="city" placeholder="Your city">
        
        <select required name="landState">
          <option value="">Land requirement (AP or TG)</option>
          <option value="Andhra Pradesh">Andhra Pradesh (AP)</option>
          <option value="Telangana">Telangana (TG)</option>
        </select>
        
        <select required name="budget">
          <option value="">Your budget per acre</option>
          <option value="25L to 30L per acre">25L to 30L per acre</option>
          <option value="30L to 35L per acre">30L to 35L per acre</option>
          <option value="35L to 40L per acre">35L to 40L per acre</option>
          <option value="40L to 45L per acre">40L to 45L per acre</option>
          <option value="45L+ per acre">45L+ per acre</option>
        </select>
        
        <button class="button" type="submit">Submit Request</button>
      </form>
    </section>
  </main>

  <script>
    document.getElementById("appointment").onsubmit = function(e){
      e.preventDefault();
      
      window.dataLayer.push({
        'event': 'form_submitted',
        'formId': 'appointment'
      });
      
      var formData = new FormData(this);
      
      // Submit directly to your live Web App URL configuration 
      fetch("https://script.google.com/macros/s/AKfycbwCpj-CUqNmmO5BHjws5llbA-8Emh3Wa_s6EW4xRn6TuiFv3UoucaW7eVMoaQ6bUz1f/exec", {
        method: "POST",
        mode: "no-cors",
        body: new URLSearchParams(formData)
      });
      
      window.location.href = "thankyou.html"; 
    };
  </script>
</body>
</html>
