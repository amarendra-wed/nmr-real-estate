    .data-display h3 {margin-top:0;color:#155a49;border-bottom:1px solid #d6dfd9;padding-bottom:5px;font-size:1.1rem}

  <div class="card">
    <h1>Thank You! ✅</h1>
    <p>Your site visit request has been successfully registered.</p>

    <div class="data-display">
      <h3>Submitted Details:</h3>
      <div class="data-item"><strong>Name:</strong> <span id="view-name">Loading...</span></div>
      <div class="data-item"><strong>Phone:</strong> <span id="view-phone">Loading...</span></div>

  <script {nonce}>
    // Grab submitted url parameters instantly
    var urlParams = new URLSearchParams(window.location.search);
    
    document.getElementById("view-name").textContent = urlParams.get("name") || "N/A";
    document.getElementById("view-phone").textContent = urlParams.get("phone") || "N/A";
    document.getElementById("view-city").textContent = urlParams.get("city") || "N/A";
    document.getElementById("view-state").textContent = urlParams.get("landState") || "N/A";
    document.getElementById("view-budget").textContent = urlParams.get("budget") || "N/A";
